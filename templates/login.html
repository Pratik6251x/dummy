{% extends "base.html" %}
{% block title %}Login – SunSync{% endblock %}
{% block content %}
<div class="stars"></div>
<div class="auth-wrap">
  <div class="auth-card animate-in">
    <div class="auth-logo">
      <span style="font-size:48px">🌙</span>
    </div>
    <h2 class="auth-title">Welcome Back</h2>
    <p class="auth-sub">Sign in to your SunSync account</p>

    <form method="POST">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" type="text" name="username" placeholder="Enter your username" required autocomplete="username"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" name="password" placeholder="Enter your password" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px">
        🚀 Sign In
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="{{ url_for('register') }}">Create one free</a>
    </div>
  </div>
</div>
{% endblock %}
